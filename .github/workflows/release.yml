name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: LoopLens v__VERSION__
          releaseBody: |
            Download the macOS DMG or Windows installer below.

            macOS builds use ad-hoc signing and are not notarized yet, so your OS may require manual approval on first launch.

            If macOS says "LoopLens is damaged and can't be opened", copy LoopLens.app to Applications and run:

            xattr -dr com.apple.quarantine /Applications/LoopLens.app
          releaseDraft: true
          prerelease: false
          assetNamePattern: "LoopLens_[version]_${{ matrix.arch }}[ext]"
          args: --target ${{ matrix.target }}

  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: |
          cd desktop
          npm run tauri build -- --bundles nsis 2>&1 | Tee-Object -FilePath ../windows-build.log
          if ($LASTEXITCODE -ne 0) {
            $tail = Get-Content ../windows-build.log -Tail 120 | Out-String
            $escaped = $tail -replace "%", "%25" -replace "`r", "%0D" -replace "`n", "%0A"
            Write-Host "::error title=Windows Tauri build failed::$escaped"
            exit $LASTEXITCODE
          }

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $installer = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $installer) {
            Write-Host "::error title=Windows installer missing::No .exe was produced under desktop/src-tauri/target/release/bundle/nsis"
            exit 1
          }
          $target = "desktop/src-tauri/target/release/bundle/nsis/LoopLens_${version}_windows_x64.exe"
          Copy-Item $installer.FullName $target -Force

      - name: Publish Windows installer
        uses: softprops/action-gh-release@v2
        with:
          name: LoopLens ${{ github.ref_name }}
          body: |
            Download the macOS DMG or Windows installer below.

            macOS builds use ad-hoc signing and are not notarized yet, so your OS may require manual approval on first launch.

            If macOS says "LoopLens is damaged and can't be opened", copy LoopLens.app to Applications and run:

            xattr -dr com.apple.quarantine /Applications/LoopLens.app
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: desktop/src-tauri/target/release/bundle/nsis/LoopLens_*_windows_x64.exe
