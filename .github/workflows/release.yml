name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: LoopLens v__VERSION__
          releaseBody: |
            Download the macOS bundle below.

            This build is unsigned and not notarized yet, so macOS may require manual approval on first launch.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "LoopLens_[version]_${{ matrix.arch }}[ext]"
          args: --target ${{ matrix.target }}
